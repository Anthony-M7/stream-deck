<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bit & Vatio PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

    <style>
        body{
            background-color: #121212;
            color: #E0E0E0;
            font-family: "Monstserrat", sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 100px;
        }

        .grid-container{
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        .btn {
            background: #1E1E1E; 
            border: 2px solid #00FFFF;
            color: #00FFFF;
            padding: 15px 5px;
            font-size: 0.9rem;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 4px 0 #008B8B;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .btn:active { transform: translateY(4px); box-shadow: none; }

        .volume-container {
            grid-column: span 2; background: #1E1E1E; padding: 10px;
            border-radius: 10px; border: 1px solid #333; text-align: center;
        }
        input[type=range] { width: 100%; accent-color: #00FFFF; height: 25px; }
        .full-width { grid-column: span 2; }

        .info-bar {
            width: 100%; max-width: 400px;
            background: #000; border-bottom: 2px solid #00FFFF;
            padding: 10px; margin-bottom: 15px; text-align: center;
            font-size: 0.8rem; color: #00FFFF; border-radius: 5px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .btn-browser { border-color: #FF8C00; color: #FF8C00; box-shadow: 0 4px 0 #9e5700; }
        .btn-danger { border-color: #FF0055; color: #FF0055; box-shadow: 0 4px 0 #990033; }

        .section-title {
            width: 100%; max-width: 400px; text-align: left;
            margin-top: 20px; margin-bottom: 10px;
            color: #aaa; font-size: 0.8rem; border-bottom: 1px solid #333;
        }
        /* Estilo para Botones Custom */
        .btn-custom { border-color: #ADFF2F; color: #ADFF2F; box-shadow: 0 4px 0 #556B2F; }
        .delete-icon {
            position: absolute; top: -5px; right: -5px;
            background: red; color: white; width: 20px; height: 20px;
            border-radius: 50%; font-size: 12px; line-height: 20px;
            display: none; /* Se oculta por defecto */
        }
        .edit-mode .delete-icon { display: block; }
        /* MODAL DE CREACIÓN */
        #modalCrear {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #222; border: 2px solid #00FFFF;
            padding: 20px; z-index: 1000; width: 80%; max-width: 300px;
            border-radius: 10px; box-shadow: 0 0 20px rgba(0,255,255,0.2);
        }
        .overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999;
        }
        input, select {
            width: 100%; padding: 10px; margin-bottom: 10px;
            background: #333; border: 1px solid #555; color: white;
            box-sizing: border-box;
        }
        .btn-save { background: #00FFFF; color: black; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        
    </style>
</head>
<body>
    <h1>Stream Deck - Casero / Bit & Vatio</h1>

    <div id="statusInfo" class="info-bar">
        🔌 Conectado - Esperando info...
    </div>

    <div class="grid-container">
        <div class="volume-container">
            <label for="#volSlider">Control de Volumen</label>
            <input type="range" id="volSlider" min="0" max="100" value="50" oninput="handleVolumeInput(this.value)">
        </div>

        <div class="btn" onclick="send('prev')">⏮</div>
        <div class="btn" onclick="send('next')">⏭</div>

        <div class="btn full-width" onclick="send('play_pause')">⏯ PLAY / PAUSE</div>

        <div class="btn btn-browser" onclick="send('youtube')">📺 YouTube</div>
        <div class="btn btn-browser" onclick="send('netflix')">🍿 Netflix</div>
        <div class="btn btn-browser" onclick="send('gemini')">🧠 GEMINI</div>
        <div class="btn btn-social" onclick="send('whatsapp')">💬 WhatsApp</div>
        <div class="btn btn-browser full-width" onclick="send('brave_new')">➕ Nueva Pestaña</div>

        <div class="btn" onclick="send('screenshot')">📸 FOTO</div>
        <div class="btn" onclick="send('antigravity')">🚀 Antigravity</div>

        <div class="btn btn-danger" onclick="send('alt_tab')">🔄 TAB</div>
        <div class="btn btn-danger" onclick="send('bloquear_pc')">🔒 BLOQUEAR</div>
        <div class="btn btn-danger full-width" onclick="send('minimizar_todo')">⬇️ ESCONDER TODO ⬇️</div>
        <div class="btn btn-danger full-width" onclick="send('cerrar_ventana')">❌ CERRAR APP ❌</div>

    </div>

    <div class="section-title">MIS ATAJOS</div>
        <div class="grid-container" id="customGrid"></div>

            <br>
            <div class="grid-container">
                <div class="btn" style="border-style: dashed; color: #888; border-color: #555;" onclick="abrirModal()">➕ CREAR NUEVO</div>
                <div class="btn" style="border-style: dashed; color: #f00; border-color: #500;" onclick="toggleDeleteMode()">🗑️ BORRAR</div>
            </div>
            
            <div class="overlay" id="overlay" onclick="cerrarModal()"></div>
                <div id="modalCrear">
                    <h3 style="color:white; margin-top:0">Nuevo Atajo</h3>
                    
                    <label style="color:#aaa; font-size:12px">Nombre del Botón</label>
                    <input type="text" id="nombreInput" placeholder="Ej: Copiar">
                    
                    <label style="color:#aaa; font-size:12px">Acción</label>
                    <select id="tipoInput">
                        <option value="hotkey">Atajo Teclado (Ctrl+C)</option>
                        <option value="web">Abrir Web (URL)</option>
                        <option value="texto">Escribir Texto</option>
                    </select>
                    
                    <label style="color:#aaa; font-size:12px">Valor (Ej: ctrl+c o google.com)</label>
                    <input type="text" id="valorInput" placeholder="ctrl+c">
                    
                    <button class="btn-save" onclick="guardarNuevoAtajo()">GUARDAR</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- 1. CARGA INICIAL ---
        cargarAtajosCustom();
        
        // --- 2. LÓGICA DE ATAJOS CUSTOM ---
        function cargarAtajosCustom() {
            fetch('/api/atajos')
                .then(r => r.json())
                .then(data => {
                    const grid = document.getElementById('customGrid');
                    grid.innerHTML = ""; // Limpiar grid
                    
                    data.forEach((atajo, index) => {
                        // Crear el HTML de cada botón dinámicamente
                        const div = document.createElement('div');
                        div.className = 'btn btn-custom';
                        div.innerText = atajo.nombre;
                        
                        // Icono borrar
                        div.innerHTML += `<span class="delete-icon" onclick="borrarAtajo(${index}, event)">X</span>`;
                        
                        // Acción al hacer click
                        div.onclick = (e) => {
                            if (!e.target.classList.contains('delete-icon')) {
                                ejecutarCustom(atajo);
                            }
                        };
                        grid.appendChild(div);
                    });
                });
        }

        function ejecutarCustom(atajo) {
            if (navigator.vibrate) navigator.vibrate(40);
            fetch('/ejecutar_custom', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(atajo)
            });
        }

        function guardarNuevoAtajo() {
            const nombre = document.getElementById('nombreInput').value;
            const tipo = document.getElementById('tipoInput').value;
            const valor = document.getElementById('valorInput').value;
            
            if(!nombre || !valor) return alert("Llena los datos");

            fetch('/api/crear', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({nombre, tipo, valor})
            }).then(() => {
                cerrarModal();
                cargarAtajosCustom(); // Recargar la lista
            });
        }

        function borrarAtajo(index, event) {
            event.stopPropagation(); // Evitar que se pulse el botón al borrar
            if(confirm("¿Borrar este botón?")) {
                fetch(`/api/borrar/${index}`, {method: 'DELETE'})
                .then(() => cargarAtajosCustom());
            }
        }

        function toggleDeleteMode() {
            document.getElementById('customGrid').classList.toggle('edit-mode');
        }

        // --- 3. UI DEL MODAL ---
        function abrirModal() {
            document.getElementById('modalCrear').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function cerrarModal() {
            document.getElementById('modalCrear').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        // --- 4. LÓGICA CORE (VOLUMEN, ETC) ---
        let previousVolume = 50;
        let timeout = null;
        function handleVolumeInput(val) {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                let diff = val - previousVolume;
                if (diff === 0) return;
                let direction = diff > 0 ? 'up' : 'down';
                fetch(`/volumen/${direction}/${Math.abs(diff)}`);
                previousVolume = val;
            }, 50); 
        }

        function send(cmd) {
            if (navigator.vibrate) navigator.vibrate(30);
            fetch(`/ejecutar/${cmd}`);
        }
        
        setInterval(() => {
            fetch('/estado_pc').then(r=>r.json()).then(d => {
                document.getElementById('statusInfo').innerText = "🖥️ " + d.titulo_ventana;
            });
        }, 2000);

    </script>
</body>
</html>
